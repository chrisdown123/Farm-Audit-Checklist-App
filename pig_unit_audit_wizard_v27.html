<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Pig Unit Audit Wizard v26</title><style>
*{box-sizing:border-box} body{margin:0;background:#f4f6f8;color:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:20px} .wrap{max-width:780px;margin:0 auto;padding:14px} .card{background:white;border:1px solid #d8dde6;border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 1px 3px #0001} h1{font-size:30px;margin:6px 0} h2{font-size:25px;margin:6px 0 12px} label{display:block;font-weight:800;margin:14px 0 6px} input,select,textarea{width:100%;font-size:20px;padding:15px;border:1px solid #cfd6df;border-radius:12px;background:white} textarea{min-height:105px} button,.appbtn{display:block;text-align:center;text-decoration:none;width:100%;font-size:20px;font-weight:800;border:0;border-radius:14px;padding:16px;margin:7px 0;touch-action:manipulation} .blue{background:#1d4ed8;color:white} .green{background:#15803d;color:white} .red{background:#b91c1c;color:white} .grey{background:#e5e7eb;color:#111} .amber{background:#f59e0b;color:#111} .small{font-size:15px;color:#666} .row{display:flex;gap:10px}.row>*{flex:1}.hidden{display:none!important}.status{background:#eef2ff;color:#1e3a8a;border-radius:10px;padding:10px;font-size:15px}.warn{background:#fff7ed;color:#9a3412;border-radius:10px;padding:10px}.photo{max-width:100%;border:1px solid #ddd;border-radius:10px;margin-top:8px}.adminBtn{font-size:16px;padding:10px;background:#f3f4f6;color:#555}.adminSummary{font-size:16px;color:#555;padding:12px;cursor:pointer}.adminLoginBox{padding:8px 0} table{width:100%;border-collapse:collapse;font-size:14px}td,th{border:1px solid #ddd;padding:6px;vertical-align:top}
</style></head><body><div class="wrap"><div id="start" class="card"><h1>Pig Unit Audit Wizard</h1><p class="small">v25 Mobile Edition</p><div id="status" class="status">App ready</div><label>Farm name</label><select id="farm"><option value="">Select farm...</option><option value="Allensford">Allensford</option>
<option value="Burrowton">Burrowton</option>
<option value="Copse">Copse</option>
<option value="Enfield">Enfield</option>
<option value="Exton">Exton</option>
<option value="Gearns">Gearns</option>
<option value="Hayes">Hayes</option>
<option value="Hayne">Hayne</option>
<option value="Leach Mousehole">Leach Mousehole</option>
<option value="Leach Spence Cross">Leach Spence Cross</option>
<option value="Lincolns">Lincolns</option>
<option value="Manor Farm">Manor Farm</option>
<option value="Mill Tree">Mill Tree</option>
<option value="Nick Marshall">Nick Marshall</option>
<option value="Orchard Cottage">Orchard Cottage</option>
<option value="Patchington">Patchington</option>
<option value="Thorn">Thorn</option>
<option value="Tidball">Tidball</option>
<option value="Weaver&#x27;s Meadow">Weaver&#x27;s Meadow</option></select><label>Inspector</label><input id="inspector" placeholder="Enter inspector name"><label>Audit date</label><input id="auditDate" type="date"><a href="javascript:startAudit()" class="blue appbtn" onclick="startAudit();return false;" ontouchend="startAudit();return false;">Start Audit</a><p id="startMsg" class="warn hidden"></p><hr><details id="adminDetails"><summary class="adminSummary">Admin</summary><div class="adminLoginBox"><label>Admin PIN</label><input id="adminPin" type="password" inputmode="numeric" placeholder="Enter PIN" oninput="checkAdminPin()"><a href="javascript:checkAdminPin()" class="adminBtn appbtn" onclick="checkAdminPin();return false;" ontouchend="checkAdminPin();return false;">Unlock Admin</a><p id="adminPinMsg" class="small"></p></div></details></div>
<div id="audit" class="card hidden"><h2 id="qTitle"></h2><p id="qText" style="font-size:24px;font-weight:800"></p><p id="criticalBadge" class="small"></p><div class="row"><a href="javascript:answerYes()" class="green appbtn" onclick="answerYes();return false;" ontouchend="answerYes();return false;">YES</a><a href="javascript:answerNo()" class="red appbtn" onclick="answerNo();return false;" ontouchend="answerNo();return false;">NO</a></div><div id="noBox" class="hidden"><label>Comments / problem</label><textarea id="comments"></textarea><label>Action required</label><textarea id="action"></textarea><label>Action by date</label><input id="dueDate" type="date"><label>Photos</label><button type="button" class="grey" onclick="document.getElementById('camera').click()">Take Photo</button><input id="camera" class="hidden" type="file" accept="image/*" capture="environment" onchange="addPhotos(this.files)"><button type="button" class="grey" onclick="document.getElementById('upload').click()">Upload Photo</button><input id="upload" class="hidden" type="file" accept="image/*" multiple onchange="addPhotos(this.files)"><div id="photoList"></div><a href="javascript:saveNoAndNext()" class="blue appbtn" onclick="saveNoAndNext();return false;" ontouchend="saveNoAndNext();return false;">Next</a></div><a href="javascript:prevQuestion()" class="grey appbtn" onclick="prevQuestion();return false;" ontouchend="prevQuestion();return false;">Back</a></div>
<div id="finish" class="card hidden"><h2>Audit finished</h2><div id="summary"></div><a href="javascript:saveReport()" class="blue appbtn" onclick="saveReport();return false;" ontouchend="saveReport();return false;">Save Report File</a><a href="javascript:printReport()" class="grey appbtn" onclick="printReport();return false;" ontouchend="printReport();return false;">Print / Save PDF</a><a href="javascript:openEmail()" class="amber appbtn" onclick="openEmail();return false;" ontouchend="openEmail();return false;">Open Email</a><a href="javascript:location.reload()" class="grey appbtn" onclick="location.reload();return false;" ontouchend="location.reload();return false;">New Audit</a></div>
<div id="admin" class="card hidden"><h2>Admin</h2><p class="small">Edit farms and questions below, then save.</p><label>Farms, one per line</label><textarea id="adminFarms" style="min-height:180px"></textarea><a href="javascript:saveFarms()" class="blue appbtn" onclick="saveFarms();return false;" ontouchend="saveFarms();return false;">Save Farms</a><h3>Questions</h3><div id="adminQuestions"></div><a href="javascript:saveQuestions()" class="blue appbtn" onclick="saveQuestions();return false;" ontouchend="saveQuestions();return false;">Save Questions</a><a href="javascript:showStart()" class="grey appbtn" onclick="showStart();return false;" ontouchend="showStart();return false;">Back to Start</a></div></div>
<script>
var DEFAULT_FARMS = ["Allensford", "Burrowton", "Copse", "Enfield", "Exton", "Gearns", "Hayes", "Hayne", "Leach Mousehole", "Leach Spence Cross", "Lincolns", "Manor Farm", "Mill Tree", "Nick Marshall", "Orchard Cottage", "Patchington", "Thorn", "Tidball", "Weaver's Meadow"];
var DEFAULT_QUESTIONS = [{"num": 1, "text": "Dead pigs in locked bins/incinerator & not visible?", "critical": true}, {"num": 2, "text": "Is the dead bin securely locked?", "critical": true}, {"num": 3, "text": "Are all drugs/vaccines/old bottles locked away?", "critical": true}, {"num": 4, "text": "Is the Medicine Record Book up to date?", "critical": true}, {"num": 5, "text": "Housing Hygiene: Are individual and sick pens satisfactory?", "critical": true}, {"num": 6, "text": "Did you confirm satisfactory water flow rates?", "critical": true}, {"num": 7, "text": "Do all pens have ample bedding/enrichment provided?", "critical": true}, {"num": 8, "text": "Can you confirm that no pens are overstocked?", "critical": true}, {"num": 9, "text": "Are all buildings lockable and locked at night?", "critical": true}, {"num": 10, "text": "Has loading bay area been scanned (Thermal)?", "critical": true}, {"num": 11, "text": "Has sick pen area been scanned (Thermal)?", "critical": true}, {"num": 12, "text": "Is a ventilation failure alarm system in place?", "critical": true}, {"num": 13, "text": "Is the unit free of evidence of blood from euthanasia?", "critical": true}, {"num": 14, "text": "Is the unit free of any pigs with visible ruptures?", "critical": true}, {"num": 15, "text": "Lameness: Is the unit free of pigs requiring euthanasia?", "critical": true}, {"num": 16, "text": "Is the unit free of cut tails on floors / surfaces?", "critical": true}, {"num": 17, "text": "Is the captive bolt working/maintained correctly?", "critical": true}, {"num": 18, "text": "Staff confirm manual blunt force trauma is NOT used?", "critical": true}, {"num": 19, "text": "Are manipulative/enrichment materials provided?", "critical": true}, {"num": 20, "text": "Is a clear Emergency Action Plan displayed?", "critical": true}, {"num": 21, "text": "Clean boots/overalls provided for visit?", "critical": false}, {"num": 22, "text": "Visitor book filled in upon arrival?", "critical": false}, {"num": 23, "text": "Site Standards: Loading bay & alleyways clean/tidy?", "critical": false}, {"num": 24, "text": "Is the site currently free of vermin?", "critical": false}, {"num": 25, "text": "Are pens free of wasted food?", "critical": false}, {"num": 26, "text": "Area under feed silos clean/free of waste?", "critical": false}, {"num": 27, "text": "Are all feeders in good working condition?", "critical": false}, {"num": 28, "text": "Are all pens currently serviceable?", "critical": false}, {"num": 29, "text": "Are all pens currently being used?", "critical": false}, {"num": 30, "text": "Have main pig buildings been scanned (Thermal)?", "critical": false}, {"num": 31, "text": "Ventilation systems/fans running correctly?", "critical": false}, {"num": 32, "text": "Pens free of draughts and damp patches?", "critical": false}, {"num": 33, "text": "General air quality (dust/gas) satisfactory?", "critical": false}, {"num": 34, "text": "Light intensity at least 40 lux for 8 hours daily?", "critical": false}, {"num": 35, "text": "All light fixtures and windows maintained?", "critical": false}, {"num": 36, "text": "Lighting effective for full animal inspection?", "critical": false}, {"num": 37, "text": "Are floors/slats in good condition to prevent injury?", "critical": false}, {"num": 38, "text": "Is there a pest control programme documented?", "critical": false}, {"num": 39, "text": "Are staff training records up to date?", "critical": false}, {"num": 40, "text": "Is the farm's identification and register up to date?", "critical": false}];
var questions = [];
var answers = [];
var idx = 0;
var meta = {farm:'', inspector:'', date:''};
function $(id){return document.getElementById(id);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function addDaysISO(dateStr, days){var d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10);}
function safeGet(key, fallback){try{var v=localStorage.getItem(key); return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function safeSet(key, value){try{localStorage.setItem(key, JSON.stringify(value));}catch(e){alert('Could not save settings on this device.');}}
function init(){questions=safeGet('pigAuditQuestionsV27',DEFAULT_QUESTIONS); var farms=safeGet('pigAuditFarmsV27',DEFAULT_FARMS); populateFarms(farms); $('auditDate').value=todayISO(); $('status').textContent='JavaScript running - app ready';}
function populateFarms(farms){farms=(farms||DEFAULT_FARMS).filter(Boolean).sort(function(a,b){return a.localeCompare(b);}); var sel=$('farm'); sel.innerHTML='<option value="">Select farm...</option>'; farms.forEach(function(f){var o=document.createElement('option'); o.value=f; o.textContent=f; sel.appendChild(o);});}
function showOnly(id){['start','audit','finish','admin'].forEach(function(x){$(x).classList.add('hidden');}); $(id).classList.remove('hidden');}
function showStart(){showOnly('start');}
function startAudit(){meta.farm=$('farm').value; meta.inspector=$('inspector').value.trim(); meta.date=$('auditDate').value; if(!meta.farm||!meta.inspector||!meta.date){$('startMsg').textContent='Please select farm, enter inspector and audit date.'; $('startMsg').classList.remove('hidden'); return;} answers=questions.map(function(q){return {num:q.num,text:q.text,critical:q.critical,answer:'',comments:'',action:'',due:'',photos:[]};}); idx=0; showQuestion(); showOnly('audit');}
function showQuestion(){var q=answers[idx]; $('qTitle').textContent='Question '+(idx+1)+' of '+answers.length; $('qText').textContent=q.text; $('criticalBadge').textContent=q.critical?'CRITICAL ITEM - A No answer fails the audit':'Standard item'; $('comments').value=q.comments||''; $('action').value=q.action||''; $('dueDate').value=q.due||addDaysISO(meta.date,7); renderPhotos(); if(q.answer==='NO') $('noBox').classList.remove('hidden'); else $('noBox').classList.add('hidden');}
function answerYes(){answers[idx].answer='YES'; answers[idx].comments=''; answers[idx].action=''; answers[idx].due=''; answers[idx].photos=[]; nextQuestion();}
function answerNo(){answers[idx].answer='NO'; if(!answers[idx].due) answers[idx].due=addDaysISO(meta.date,7); $('dueDate').value=answers[idx].due; $('noBox').classList.remove('hidden');}
function saveNoAndNext(){var q=answers[idx]; q.answer='NO'; q.comments=$('comments').value.trim(); q.action=$('action').value.trim(); q.due=$('dueDate').value; if(!q.comments){alert('Please add comments before moving on.'); return;} nextQuestion();}
function nextQuestion(){if(idx<answers.length-1){idx++; showQuestion();}else{finishAudit();}}
function prevQuestion(){if(idx>0){idx--; showQuestion();}else{showOnly('start');}}
function addPhotos(files){if(!files||!files.length)return; var q=answers[idx]; var pending=files.length; Array.prototype.forEach.call(files,function(file){var r=new FileReader(); r.onload=function(e){q.photos.push({name:file.name||'photo.jpg',data:e.target.result}); pending--; if(pending===0)renderPhotos();}; r.readAsDataURL(file);});}
function renderPhotos(){var div=$('photoList'); div.innerHTML=''; (answers[idx].photos||[]).forEach(function(p,i){var im=document.createElement('img'); im.src=p.data; im.className='photo'; div.appendChild(im); var b=document.createElement('button'); b.type='button'; b.className='grey'; b.textContent='Remove photo'; b.onclick=function(){answers[idx].photos.splice(i,1); renderPhotos();}; div.appendChild(b);});}
function finishAudit(){var yes=answers.filter(function(a){return a.answer==='YES';}).length; var no=answers.filter(function(a){return a.answer==='NO';}); var crit=no.filter(function(a){return a.critical;}); var fail=crit.length>0; var html='<p><b>Farm:</b> '+esc(meta.farm)+'</p><p><b>Date:</b> '+esc(meta.date)+'</p><p><b>Inspector:</b> '+esc(meta.inspector)+'</p><p><b>Score:</b> '+yes+' / '+answers.length+'</p><h2 style="color:'+(fail?'#b91c1c':'#15803d')+'">Status: '+(fail?'FAIL':'PASS')+'</h2>'; if(no.length){html+='<h3>Failures / actions</h3><ul>'+no.map(function(a){return '<li><b>Q'+a.num+(a.critical?' CRITICAL':'')+':</b> '+esc(a.text)+'<br>'+esc(a.comments)+'<br><b>Action:</b> '+esc(a.action)+'<br><b>Due:</b> '+esc(a.due)+'</li>';}).join('')+'</ul>';} $('summary').innerHTML=html; showOnly('finish');}
function esc(s){return String(s||'').replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function reportName(ext){return (meta.farm||'Farm').replace(/[^a-z0-9]+/gi,'_')+'_Farm_Audit_Report_'+(meta.date||todayISO())+'.'+ext;}
function buildReport(){var yes=answers.filter(function(a){return a.answer==='YES';}).length; var no=answers.filter(function(a){return a.answer==='NO';}); var crit=no.filter(function(a){return a.critical;}); var fail=crit.length>0; var rows=answers.map(function(a){var photos=(a.photos||[]).map(function(p){return '<img style="max-width:240px;margin:4px;border:1px solid #ccc" src="'+p.data+'">';}).join(''); return '<tr><td>'+a.num+'</td><td>'+esc(a.text)+(a.critical?' <b>CRITICAL</b>':'')+'</td><td>'+esc(a.answer)+'</td><td>'+esc(a.comments)+'</td><td>'+esc(a.action)+'</td><td>'+esc(a.due)+'</td><td>'+photos+'</td></tr>';}).join(''); return '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(meta.farm)+' Farm Audit Report '+esc(meta.date)+'</title><style>body{font-family:Arial,sans-serif}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:6px;vertical-align:top}</style></head><body><h1>'+esc(meta.farm)+' Farm Audit Report - '+esc(meta.date)+'</h1><p><b>Inspector:</b> '+esc(meta.inspector)+'</p><p><b>Score:</b> '+yes+' / '+answers.length+'</p><h2>Status: '+(fail?'FAIL':'PASS')+'</h2><table><tr><th>#</th><th>Question</th><th>Answer</th><th>Comments</th><th>Action</th><th>Due</th><th>Photos</th></tr>'+rows+'</table></body></html>';}
function saveReport(){var blob=new Blob([buildReport()],{type:'text/html'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=reportName('html'); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000);}
function printReport(){var w=window.open('','_blank'); if(!w){alert('Popup blocked. Use Save Report File instead.'); return;} w.document.open(); w.document.write(buildReport()); w.document.close(); setTimeout(function(){w.print();},500);}
function openEmail(){var subject=encodeURIComponent((meta.farm||'Farm')+' Farm Audit Report - '+(meta.date||todayISO())); var body=encodeURIComponent('Please find the farm audit report attached/saved. If not attached automatically, use Save Report File and attach the saved HTML report.'); location.href='mailto:chris@crealy.co.uk,ben@weaversmeadow.co.uk,lowerburrowton@crealy.co.uk?subject='+subject+'&body='+body;}
function adminLogin(){openAdmin();}
function checkAdminPin(){var el=$('adminPin'); if(!el){return;} var pin=el.value.trim(); if(pin==='1234'){ $('adminPinMsg').textContent='Admin unlocked'; openAdmin(); } else if(pin.length>=4){ $('adminPinMsg').textContent='Incorrect PIN'; } else { $('adminPinMsg').textContent=''; }}
function openAdmin(){var farms=[]; for(var i=1;i<$('farm').options.length;i++) farms.push($('farm').options[i].value); $('adminFarms').value=farms.join('\n'); var div=$('adminQuestions'); div.innerHTML=''; questions.forEach(function(q,i){var box=document.createElement('div'); box.className='card'; box.innerHTML='<label>Question '+q.num+'</label><textarea id="qt_'+i+'">'+esc(q.text)+'</textarea><label><input style="width:auto" type="checkbox" id="qc_'+i+'" '+(q.critical?'checked':'')+'> Critical</label>'; div.appendChild(box);}); showOnly('admin');}
function saveFarms(){var farms=$('adminFarms').value.split('\n').map(function(x){return x.trim();}).filter(Boolean).sort(function(a,b){return a.localeCompare(b);}); safeSet('pigAuditFarmsV27',farms); populateFarms(farms); alert('Farms saved');}
function saveQuestions(){questions=questions.map(function(q,i){return {num:q.num,text:$('qt_'+i).value.trim()||q.text,critical:$('qc_'+i).checked};}); safeSet('pigAuditQuestionsV27',questions); alert('Questions saved');}
window.onload=init;
</script></body></html>
